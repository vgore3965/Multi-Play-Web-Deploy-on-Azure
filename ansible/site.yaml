---

# Play 1 — Install & Configure Web Server

- name: Install and configure Nginx
  hosts: web
  become: true 

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Ensure nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: true



# Play 2 — Deploy Static Content

- name: Deploy static website
  hosts: web
  become: true

  tasks:
    - name: Copy index.html to web servers
      copy:
        src: files/index.html # local machine
        dest: /var/www/html/index.html # default html file on server
        owner: www-data
        group: www-data
        mode: '0644'
      notify: Restart nginx

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted



# Play 3 — Verify Deployment

- name: Verify website from controller
  hosts: localhost
  gather_facts: false

  vars:
    web_ips: "{{ groups['web'] }}"

  tasks:
    - name: Check HTTP response from each server
      uri:
        url: "http://{{ item }}"
        method: GET
        return_content: no
        status_code: 200
      loop: "{{ web_ips }}"